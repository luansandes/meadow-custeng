<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meadow Vet Care | Services assistant</title>
    <style>
      :root { color-scheme: light; --ink: #12332b; --muted: #587068; --surface: #fffdf8; --accent: #19755f; --accent-dark: #115644; --line: #d9e5dd; --warn: #9a3d25; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #e8f3ec, #f8f4e8); color: var(--ink); font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(720px, calc(100% - 32px)); margin: 32px auto; padding: 32px; background: var(--surface); border: 1px solid var(--line); border-radius: 20px; box-shadow: 0 18px 45px #17362a1a; }
      h1 { margin: 0; font-size: clamp(1.75rem, 4vw, 2.4rem); letter-spacing: -.04em; }
      .intro { margin: 8px 0 28px; color: var(--muted); }
      form { display: flex; gap: 10px; }
      input { width: 100%; min-width: 0; padding: 13px 15px; border: 1px solid #afc7ba; border-radius: 10px; color: var(--ink); font: inherit; }
      input:focus { outline: 3px solid #9ad4bd; outline-offset: 1px; }
      button { border: 0; border-radius: 10px; padding: 13px 18px; background: var(--accent); color: white; font: inherit; font-weight: 700; cursor: pointer; }
      button:hover:not(:disabled) { background: var(--accent-dark); }
      button:disabled { cursor: wait; opacity: .65; }
      #result { margin-top: 24px; }
      .answer { white-space: pre-wrap; }
      .error { color: var(--warn); }
      .sources { margin: 18px 0 0; padding-top: 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: .92rem; }
      .sources ul { margin: 6px 0 0; padding-left: 20px; }
      .hint { margin: 18px 0 0; color: var(--muted); font-size: .85rem; }
      @media (max-width: 540px) { main { padding: 24px; } form { flex-direction: column; } button { width: 100%; } }
    </style>
  </head>
  <body>
    <main>
      <h1>Meadow Vet Care</h1>
      <p class="intro">Ask about our services, prices, species, appointment requirements, or availability.</p>
      <form id="chat-form">
        <label class="sr-only" for="question" style="position:absolute;left:-9999px">Your question</label>
        <input id="question" name="question" maxlength="500" required autocomplete="off" placeholder="For example: What dental services are available for cats?">
        <button id="submit" type="submit">Ask</button>
      </form>
      <section id="result" aria-live="polite"></section>
      <p class="hint">Answers are based only on Meadow Vet Care’s service list.</p>
    </main>
    <script>
      // Replace this after the first Vercel production deployment. Do not add a trailing slash.
      const API_BASE_URL = 'https://meadow-custeng-2tue.vercel.app';
      const form = document.querySelector('#chat-form');
      const question = document.querySelector('#question');
      const submit = document.querySelector('#submit');
      const result = document.querySelector('#result');

      function showError(message) {
        result.replaceChildren();
        const paragraph = document.createElement('p');
        paragraph.className = 'error';
        paragraph.textContent = message;
        result.append(paragraph);
      }

      function showAnswer(payload) {
        result.replaceChildren();
        const answer = document.createElement('p');
        answer.className = 'answer';
        answer.textContent = payload.answer;
        result.append(answer);
        if (payload.sources && payload.sources.length) {
          const sources = document.createElement('div');
          sources.className = 'sources';
          const label = document.createElement('strong');
          label.textContent = 'Services used';
          const list = document.createElement('ul');
          payload.sources.forEach((source) => {
            const item = document.createElement('li');
            item.textContent = `${source.service_name} (${source.species}) — ${source.service_id}`;
            list.append(item);
          });
          sources.append(label, list);
          result.append(sources);
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const value = question.value.trim();
        if (!value) return;
        if (API_BASE_URL.includes('YOUR-VERCEL-PROJECT')) {
          showError('This chatbot is awaiting its Vercel API URL.');
          return;
        }
        submit.disabled = true;
        submit.textContent = 'Thinking…';
        result.textContent = 'Searching Meadow’s services…';
        try {
          const response = await fetch(`${API_BASE_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: value })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Unable to answer that right now.');
          showAnswer(payload);
        } catch (error) {
          showError(error.message || 'Unable to answer that right now.');
        } finally {
          submit.disabled = false;
          submit.textContent = 'Ask';
        }
      });
    </script>
  </body>
</html>
